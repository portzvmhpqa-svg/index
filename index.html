<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE-BATT ART | 电池重生艺术档案</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #F8FAFC;
        }
        /* 进场动画 */
        .animate-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 核心按钮呼吸效果 */
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .btn-core {
            animation: pulse-blue 2s infinite;
        }
        /* 时间轴装饰线 */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 1.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #E2E8F0;
        }
    </style>
</head>
<body class="text-slate-900 leading-relaxed overflow-x-hidden">

    <div id="app" class="min-h-screen flex flex-col">
        
        <!-- 头部导航 -->
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="showTab('home')">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="zap" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="font-black text-xl tracking-tighter text-slate-800 italic">RE-BATT <span class="text-blue-600">ART</span></span>
                </div>
                <div class="flex items-center gap-6">
                    <button onclick="showTab('search')" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition-colors flex items-center gap-2">
                        <i data-lucide="search" class="w-4 h-4"></i> 溯源查询
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
            
            <!-- 首页 -->
            <div id="home-content" class="tab-content animate-in space-y-16">
                <section class="flex flex-col md:flex-row items-center gap-12 py-10">
                    <div class="flex-1 space-y-8">
                        <div class="inline-block px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest">
                            Official Archive • 官方档案
                        </div>
                        <h1 class="text-5xl md:text-6xl font-black text-slate-900 leading-tight">
                            电池再生<br/>
                            <span class="text-blue-600">让爱车再陪伴你新的十年</span>
                        </h1>
                        <p class="text-lg text-slate-500 max-w-xl font-medium">
                            RE-BATT ART 专注于将新能源汽车退役动力电池转化为具有科技美学的桌面摆件。我们记录每一公里的电力起伏，让曾经陪伴你的“心脏”以艺术之名重生。
                        </p>
                    </div>

                    <div class="flex-1 flex flex-col items-center md:items-end w-full">
                        <div class="relative group mb-10">
                            <div class="w-64 h-64 md:w-80 md:h-80 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-[3rem] shadow-2xl flex items-center justify-center overflow-hidden transform group-hover:scale-105 transition-transform duration-500">
                                 <div class="text-white text-center p-8">
                                    <i data-lucide="box" class="w-20 h-20 mx-auto mb-4 opacity-30"></i>
                                    <p class="font-mono text-xs opacity-60 italic tracking-widest">RE-BATT ART CASE #001</p>
                                 </div>
                            </div>
                            <div class="mt-8 md:mt-12 w-full flex justify-center md:justify-end">
                                <button onclick="showTab('search')" class="btn-core px-10 py-5 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 transition-all shadow-2xl shadow-blue-200 flex items-center gap-3">
                                    输入编号查询我的专属定制 <i data-lucide="search" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- 其他科普内容省略部分，保持界面简洁 -->
                <section class="grid grid-cols-1 md:grid-cols-2 gap-12 py-12 border-t border-slate-100">
                    <div class="space-y-6">
                        <h2 class="text-3xl font-black text-slate-900">分级回收：电池的“二次生命”</h2>
                        <p class="text-slate-600">动力电池在容量衰减至 80% 以下时即面临退役。根据分级回收利用原则，SOH 较高的电池用于储能，而具有历史意义的单体则固化为艺术摆件。</p>
                    </div>
                </section>
            </div>

            <!-- 搜索页 -->
            <div id="search-content" class="tab-content hidden py-20 animate-in">
                <div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 text-center space-y-8">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto">
                        <i data-lucide="shield-check" class="w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-2xl font-black text-slate-900 uppercase italic">Verification</h3>
                        <p class="text-slate-400 text-sm font-medium">请输入艺术摆件底座的 3 位防伪编码 (试用: 001)</p>
                    </div>
                    <input id="idInput" type="text" maxlength="3" placeholder="000" 
                           class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl px-6 py-5 text-center text-5xl font-black tracking-widest outline-none transition-all">
                    <button onclick="handleSearch()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">
                        查询我的定制档案
                    </button>
                    <button onclick="showTab('home')" class="text-slate-400 text-xs font-bold uppercase hover:text-slate-600">返回首页</button>
                </div>
            </div>

            <!-- 溯源详情页 -->
            <div id="trace-content" class="tab-content hidden animate-in space-y-8 pb-20"></div>

        </main>
    </div>

    <script>
        // 将上传文档中的内容注入 database
        const database = {
            '001': {
                id: '001',
                model: 'Tesla Model X',
                owner: 'Qin Wenjie',
                serial: 'RB-MX-2015-X01',
                meta: { days: '3,826', km: '158,420', co2: '28.6', trees: '1,560' },
                milestones: [
                    { date: '2015.10.01', title: '专属旅程', desc: '你将特斯拉 Model X 开回了家，这一天你拥有了新伙伴，开启了与它的专属旅程。' },
                    { date: '2015.11.15', title: '智能先行', desc: '你首次使用特斯拉 Model X 的自动辅助驾驶功能。' },
                    { date: '2016.01.01', title: '迎接新年', desc: '新年第一天，驾驶特斯拉在城市穿梭，看城市烟火，它陪伴你迎接新的一年。' },
                    { date: '2016.02.08', title: '长途返乡', desc: '春节期间，你开着特斯拉长途返乡，听歌两小时，不知道天空能否读懂你的心情。' },
                    { date: '2016.04.10', title: '超级充电', desc: '你首次在超级充电站为特斯拉充电，终于不用再担心能源车的续航。' },
                    { date: '2016.08.18', title: '音乐盛宴', desc: '你使用特斯拉的车载娱乐系统三小时四十五分钟，在车内享受了一场专属的音乐盛宴。' },
                    { date: '2016.09.30', title: '隐藏美景', desc: '你在一次杭州-湖州短途旅行中，特斯拉精准的导航系统带你发现了许多隐藏的美景。' },
                    { date: '2016.11.10', title: '软件更新', desc: '特斯拉迎来了一次大型的软件更新，更新后第一时间你就驾车行驶160公里，新增的功能让你迫不及待地去探索和体验。' },
                    { date: '2017.01.15', title: '凛冬守望', desc: '在寒冷的冬天特斯拉的电池预热功能陪伴你前行，在这一天在零下天气完美行驶55公里。' },
                    { date: '2017.01.25', title: '更换轮毂', desc: '你为特斯拉更换了一套新的轮毂。' },
                    { date: '2017.05.05', title: '维修焕新', desc: '你遇到了小刮蹭，经过维修后又恢复了崭新的模样。' },
                    { date: '2017.06.20', title: '风雨同舟', desc: '你遇到了暴风雨，在雨中你驾驶特斯拉稳定行驶了34公里，但是还是要安全第一。' },
                    { date: '2018.03.18', title: '公益活动', desc: '参加特斯拉车主俱乐部组织的公益活动，你和特斯拉一起为环保贡献力量。' },
                    { date: '2018.04.22', title: '里程碑突破', desc: '特斯拉的续航里程突破了一个新的里程碑，见证了你们一起走过的漫长路途。' },
                    { date: '2019.05.31', title: '跨省旅行', desc: '你驾驶特斯拉进行了一次长途的跨省旅行。' },
                    { date: '2020.01.01', title: '新的十年', desc: '新的十年开启，特斯拉陪伴你继续前行，迎接更多未知的美好。' },
                    { date: '2020.02.08', title: '疫情停放', desc: '受疫情影响出行减少，特斯拉静静停在车库，等待着与你再次出发。' },
                    { date: '2020.08.18', title: '小众景点', desc: '你利用特斯拉的车载导航发现了一个小众的旅游景点。' },
                    { date: '2021.09.12', title: '系统升级', desc: '特斯拉的中控屏显示系统进行了升级。' },
                    { date: '2023.09.12', title: '地图更新', desc: '特斯拉的车载地图进行了更新，新增了许多地点和路线信息。' },
                    { date: '2023.10.25', title: '专属内饰', desc: '你为特斯拉定制了一套专属的内饰套件，提升了车内的质感。' },
                    { date: '2024.10.20', title: '安全守护', desc: '你为特斯拉更换了新的刹车片，确保行车安全。' },
                    { date: '2025.03.28', title: '用户反馈', desc: '你参加特斯拉举办的用户反馈活动，为车辆的进一步优化提出了自己的建议。' },
                    { date: '2025.09.12', title: '娱乐更新', desc: '特斯拉的车载娱乐系统更新了更多的内容，让你的驾驶时光更加丰富多彩。' },
                    { date: '2025.10.25', title: '精彩记录', desc: '你为特斯拉安装了一套行车记录仪，记录下每一段精彩的旅程。' },
                    { date: '2026.01.01', title: '新的起点', desc: '新的一年，特斯拉已经不再年轻，但它仍然陪伴你站在新的起点，展望未来的无限可能。' },
                    { date: '2026.02.08', title: '引擎故障', desc: '特斯拉引擎出现故障，在店维修后告知你即将无法继续行驶。' },
                    { date: '2026.03.23', title: '回收重塑', desc: '特斯拉正式回收，在你允许下，零件被回收再利用。电池被制作成新的摆件，编号001。让特斯拉再陪伴你新的十年。' }

                ]
            }
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(tabId + '-content');
            if (target) target.classList.remove('hidden');
            window.scrollTo(0, 0);
            lucide.createIcons();
        }

        function handleSearch() {
            const val = document.getElementById('idInput').value.trim();
            if (database[val]) {
                renderDetails(database[val]);
                showTab('trace');
            } else {
                alert('未找到编号，请尝试输入 001');
            }
        }

        function renderDetails(data) {
            const container = document.getElementById('trace-content');
            container.innerHTML = `
                <div class="bg-white border border-slate-100 p-8 md:p-12 rounded-[3rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                    <div class="space-y-4">
                        <div class="px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-black uppercase w-fit">Validated Artifact</div>
                        <h2 class="text-5xl font-black text-slate-900">${data.model}</h2>
                        <div class="flex flex-wrap gap-x-8 text-sm font-bold text-slate-400 uppercase tracking-widest">
                            <span>Owner: <span class="text-slate-900">${data.owner}</span></span>
                            <span>Serial: <span class="text-slate-900">${data.serial}</span></span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-100">
                        <h3 class="text-2xl font-black mb-10 flex items-center gap-3 italic text-slate-900">
                            <i data-lucide="heart" class="text-red-500 fill-red-500"></i> Tesla Model X 陪伴你的一生
                        </h3>
                        <div class="relative pl-8 timeline-line space-y-10">
                            ${data.milestones.map(m => `
                                <div class="relative">
                                    <div class="absolute -left-[2.35rem] top-1.5 w-5 h-5 bg-white border-4 border-blue-600 rounded-full z-10"></div>
                                    <div class="font-black text-blue-600 text-xs font-mono mb-1">${m.date}</div>
                                    <h4 class="font-black text-slate-900 uppercase italic text-base">${m.title}</h4>
                                    <p class="text-slate-500 text-sm font-medium mt-1 leading-relaxed">${m.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white">
                            <h4 class="font-black mb-6 flex items-center gap-2 uppercase italic text-sm">环保足迹</h4>
                            <div class="space-y-4">
                                <div class="flex justify-between border-b border-white/20 pb-2">
                                    <span class="opacity-60 text-xs">碳减排量</span>
                                    <span class="font-bold">${data.meta.co2} 吨</span>
                                </div>
                                <div class="flex justify-between border-b border-white/20 pb-2">
                                    <span class="opacity-60 text-xs">行驶里程</span>
                                    <span class="font-bold">${data.meta.km} KM</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white text-center">
                             <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${data.id}" class="w-32 h-32 mx-auto mb-4 rounded-xl">
                             <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Scan to Share</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
